syntax = "proto3";
package backtest;

service StrategyService {
  rpc Initialize(InitRequest) returns (InitResponse);
  rpc OnBar(BarEvent) returns (BarResponse);
  rpc OnComplete(CompleteRequest) returns (CompleteResponse);
  rpc GetRequirements(RequirementsRequest) returns (DataRequirements);
}

// --- Initialize ---

message InitRequest {
  string strategy_name = 1;
  string config_json = 2;
  repeated string symbols = 3;
  repeated InstrumentInfo instruments = 4;  // NEW: instrument metadata at init
}

message InitResponse {
  bool success = 1;
  string error = 2;
}

// --- Requirements ---

message RequirementsRequest {
  string strategy_name = 1;
  string config_json = 2;
}

message DataRequirements {
  repeated IntervalRequirement intervals = 1;
}

message IntervalRequirement {
  string interval = 1;     // "minute", "5minute", "day"
  int32 lookback = 2;      // bars to keep in history for this interval
}

// --- Bar Event (enriched) ---

message BarEvent {
  int64 timestamp_ms = 1;
  repeated TimeframeData timeframes = 2;    // bars grouped by interval
  repeated TimeframeHistory history = 3;    // lookback per (symbol, interval)
  PortfolioState portfolio = 4;
  repeated InstrumentInfo instruments = 5;  // instrument metadata
  repeated FillInfo fills = 6;              // fills from previous bar
  repeated OrderRejection rejections = 7;   // rejections from previous bar
  repeated TradeInfo closed_trades = 8;     // all closed trades so far
  SessionContext context = 9;
}

message BarData {
  string symbol = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  int64 volume = 6;
  int64 oi = 7;
}

message TimeframeData {
  string interval = 1;          // "minute", "15minute", "day"
  repeated BarData bars = 2;    // all symbols with a new bar at this interval
}

message TimeframeHistory {
  string symbol = 1;
  string interval = 2;
  repeated BarData bars = 3;    // last N bars for this (symbol, interval)
}

message InstrumentInfo {
  string symbol = 1;
  string exchange = 2;
  string instrument_type = 3;
  int32 lot_size = 4;
  double tick_size = 5;
  string expiry = 6;
  double strike = 7;
  string option_type = 8;
  double circuit_limit_upper = 9;
  double circuit_limit_lower = 10;
}

message FillInfo {
  string symbol = 1;
  string side = 2;
  int32 quantity = 3;
  double fill_price = 4;
  double costs = 5;
  int64 timestamp_ms = 6;
}

message OrderRejection {
  string symbol = 1;
  string side = 2;
  int32 quantity = 3;
  string reason = 4;
}

message TradeInfo {
  string symbol = 1;
  int32 quantity = 2;
  double entry_price = 3;
  double exit_price = 4;
  int64 entry_timestamp_ms = 5;
  int64 exit_timestamp_ms = 6;
  double pnl = 7;
  double costs = 8;
}

message SessionContext {
  double initial_capital = 1;
  int32 bar_number = 2;
  int32 total_bars = 3;
  string start_date = 4;
  string end_date = 5;
  repeated string intervals = 6;
  int32 lookback_window = 7;
}

// --- Portfolio ---

message PortfolioState {
  double cash = 1;
  double equity = 2;
  repeated PositionInfo positions = 3;
}

message PositionInfo {
  string symbol = 1;
  int32 quantity = 2;
  double avg_price = 3;
  double unrealized_pnl = 4;
}

// --- Response ---

message BarResponse {
  repeated Signal signals = 1;
}

message Signal {
  enum Action {
    HOLD = 0;
    BUY = 1;
    SELL = 2;
  }
  enum OrderType {
    MARKET = 0;
    LIMIT = 1;
    SL = 2;
    SL_M = 3;
  }
  Action action = 1;
  string symbol = 2;
  int32 quantity = 3;
  OrderType order_type = 4;
  double limit_price = 5;
  double stop_price = 6;
}

// --- Complete ---

message CompleteRequest {}

message CompleteResponse {
  string custom_metrics_json = 1;
}
